<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>MindMate v4 — AI Student Stress Detection</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        html,
        body {
            background: #050912;
            min-height: 100%;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #cce4ff
        }

        ::-webkit-scrollbar {
            width: 4px
        }

        ::-webkit-scrollbar-thumb {
            background: #183460;
            border-radius: 4px
        }

        input,
        textarea,
        button,
        select {
            font-family: 'Plus Jakarta Sans', sans-serif
        }

        video {
            display: block;
            background: #000
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(16px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-12px)
            }

            to {
                opacity: 1;
                transform: translateX(0)
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1)
            }

            50% {
                opacity: .4;
                transform: scale(1.2)
            }
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0
            }
        }

        @keyframes glow {

            0%,
            100% {
                box-shadow: 0 0 16px #00e5ff18
            }

            50% {
                box-shadow: 0 0 40px #00e5ff55
            }
        }

        @keyframes scanLine {
            0% {
                top: -3%
            }

            100% {
                top: 103%
            }
        }

        @keyframes voiceBar {

            0%,
            100% {
                transform: scaleY(.25)
            }

            50% {
                transform: scaleY(1)
            }
        }

        @keyframes bounceUp {

            0%,
            100% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(-6px)
            }
        }

        @keyframes ripple {
            to {
                transform: scale(2.4);
                opacity: 0
            }
        }

        .fu {
            animation: fadeUp .48s cubic-bezier(.22, 1, .36, 1) both
        }

        .fi {
            animation: fadeIn .32s ease both
        }

        .si {
            animation: slideIn .36s ease both
        }

        .hov:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
            transition: all .2s
        }

        .hov:active {
            transform: translateY(0)
        }

        .nav-btn:hover {
            background: #0e1e38 !important;
            color: #cce4ff !important
        }

        .card-h:hover {
            border-color: #183460 !important;
            transform: translateY(-2px);
            box-shadow: 0 8px 32px #00000033;
            transition: all .2s
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        /* ===== CONFIG ===== */
        const API = window.location.protocol === "file:" ? "http://localhost:5050/api" : "/api";

        const C = {
            bg: "#050912", bg1: "#08101f", bg2: "#0a1526",
            card: "#0c1830", card2: "#0e1e38",
            b0: "#112440", b1: "#183460",
            cyan: "#00e5ff", cA: "#00e5ff14", cB: "#00e5ff44",
            lime: "#a8ff3e", lA: "#a8ff3e14",
            rose: "#ff3e6c", rA: "#ff3e6c14",
            amber: "#ffbe00", aA: "#ffbe0014",
            violet: "#b06bff", vA: "#b06bff14",
            txt: "#cce4ff", sub: "#3d6080", dim: "#182e45",
        };

        const LVL = {
            Low: { c: "#a8ff3e", bg: "#081a04", em: "🌿", label: "Low Stress" },
            Moderate: { c: "#ffbe00", bg: "#1a1400", em: "🌤", label: "Moderate Stress" },
            High: { c: "#ff7a40", bg: "#1a0900", em: "⚠️", label: "High Stress" },
            Severe: { c: "#ff3e6c", bg: "#1a0010", em: "🔴", label: "Severe Stress" },
        };

        const RECS = {
            Low: ["Keep your sleep routine consistent.", "Stay hydrated and take outdoor breaks.", "Maintain social connections."],
            Moderate: ["Try 4-7-8 breathing: in 4s, hold 7s, out 8s.", "Reduce screen time before bed.", "Use 45-min Pomodoro study blocks.", "Reach out to a friend today."],
            High: ["Take 10 slow deep breaths right now.", "Walk 15 minutes — cuts cortisol by 26%.", "Reschedule non-urgent tasks.", "Call someone you trust.", "No caffeine after noon."],
            Severe: ["Contact campus counseling immediately.", "You are not alone — support is available now.", "Drink water, sit quietly, breathe slowly.", "Call a trusted person right now.", "Ask for academic accommodations."],
        };

        /* ===== API ===== */
        async function apiGet(p) { try { const r = await fetch(API + p, { signal: AbortSignal.timeout(5000) }); return r.ok ? r.json() : null; } catch { return null; } }
        async function apiPost(p, b) { try { const r = await fetch(API + p, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(b) }); return r.ok ? r.json() : null; } catch { return null; } }

        /* ===== UTILS ===== */
        function grabFrame(v, q = .88) { const c = document.createElement("canvas"); c.width = v.videoWidth || 640; c.height = v.videoHeight || 480; c.getContext("2d").drawImage(v, 0, 0, c.width, c.height); return c.toDataURL("image/jpeg", q).split(",")[1]; }
        function lvlFromScore(s) { return s <= 3 ? "Low" : s <= 5.5 ? "Moderate" : s <= 7.5 ? "High" : "Severe"; }
        function fmtDate() { return new Date().toLocaleDateString("en-US", { month: "short", day: "numeric" }); }
        function fmtTime() { return new Date().toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit" }).replace(/^0/, ""); }
        function seedHist() { const labels = []; for (let i = 0; i < 6; i++) { const d = new Date(); d.setDate(d.getDate() - i); labels.push(i === 0 ? "Today" : i === 1 ? "Yesterday" : d.toLocaleDateString("en-US", { month: "short", day: "numeric" })); } return labels.map((date, i) => { const s = parseFloat((3.8 + Math.sin(i * 1.2) * 1.6 + Math.random() * 1.1).toFixed(1)); return { id: "s" + i, date, time: "", stress_score: s, stress_level: lvlFromScore(s), source: ["face_scan", "voice", "combined", "face_scan", "voice", "combined"][i], confidence: 72 }; }); }

        /* ===== COMPONENTS ===== */
        function Spinner({ sz = 32, color = C.cyan, thick = 2.5 }) {
            return <div style={{ width: sz, height: sz, borderRadius: "50%", flexShrink: 0, border: `${thick}px solid ${C.b0}`, borderTop: `${thick}px solid ${color}`, animation: "spin 1s linear infinite" }} />;
        }

        function Dot({ on = true, color = C.lime, size = 7 }) {
            return <span style={{ width: size, height: size, borderRadius: "50%", display: "inline-block", flexShrink: 0, background: on ? color : C.dim, boxShadow: on ? `0 0 8px ${color}77` : "none", animation: on ? "pulse 2s infinite" : "none" }} />;
        }

        function Tag({ label, color, icon = "" }) {
            return <span style={{ display: "inline-flex", alignItems: "center", gap: 4, background: `${color}18`, border: `1px solid ${color}33`, borderRadius: 20, padding: "3px 10px", color, fontSize: 11, fontFamily: "'JetBrains Mono',monospace", fontWeight: 500, flexShrink: 0 }}>
                {icon ? icon + " " + label : label}
            </span>;
        }

        function Gauge({ score, color, size = 90 }) {
            const r = (size / 2) - 7, circ = 2 * Math.PI * r, dash = circ * (score / 10);
            return (
                <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ flexShrink: 0 }}>
                    <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={C.b0} strokeWidth={5} />
                    <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={color} strokeWidth={5}
                        strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
                        transform={`rotate(-90 ${size / 2} ${size / 2})`}
                        style={{ filter: `drop-shadow(0 0 5px ${color}88)`, transition: "stroke-dasharray 1.2s ease" }} />
                    <text x={size / 2} y={size / 2 + 1} textAnchor="middle" dominantBaseline="middle"
                        fill={color} fontSize={size * .22} fontFamily="'Space Grotesk',sans-serif" fontWeight="700">{score}</text>
                    <text x={size / 2} y={size / 2 + size * .17} textAnchor="middle"
                        fill={C.sub} fontSize={size * .09} fontFamily="'JetBrains Mono',monospace">/10</text>
                </svg>
            );
        }

        function ProbBar({ name, pct, color }) {
            const lv = LVL[name] || LVL.Low;
            return (
                <div style={{ marginBottom: 10 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                        <span style={{ color, fontSize: 12, fontWeight: 600 }}>{lv.em} {name}</span>
                        <span style={{ color: C.sub, fontSize: 11, fontFamily: "'JetBrains Mono',monospace" }}>{pct}%</span>
                    </div>
                    <div style={{ height: 4, background: C.b0, borderRadius: 2, overflow: "hidden" }}>
                        <div style={{ height: "100%", background: color, borderRadius: 2, width: `${pct}%`, transition: "width 1.1s ease" }} />
                    </div>
                </div>
            );
        }

        function VoiceWave({ active, color = C.cyan }) {
            return (
                <div style={{ display: "flex", alignItems: "center", gap: 3, height: 30, padding: "0 4px" }}>
                    {Array.from({ length: 18 }, (_, i) => (
                        <div key={i} style={{
                            width: 3, borderRadius: 2, background: color, opacity: .7,
                            height: "100%", transformOrigin: "bottom",
                            transform: active ? "scaleY(1)" : "scaleY(.2)",
                            animation: active ? `voiceBar ${.5 + Math.random() * .7}s ${i * .035}s ease-in-out infinite` : "none",
                            transition: "transform .3s ease"
                        }} />
                    ))}
                </div>
            );
        }

        /* ===== RESULT CARD ===== */
        function ResultCard({ result, onReset, label = "Scan Again" }) {
            const lv = LVL[result.stress_level] || LVL.Moderate;
            const recs = result.recommendations || RECS[result.stress_level] || [];
            return (
                <div className="fu" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 18 }}>
                    {/* LEFT */}
                    <div style={{ display: "flex", flexDirection: "column", gap: 15 }}>
                        {/* Hero */}
                        <div style={{ background: `linear-gradient(140deg,${lv.bg},${C.card})`, border: `1px solid ${lv.c}44`, borderRadius: 20, padding: 24 }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 14 }}>
                                <Gauge score={result.stress_score} color={lv.c} size={86} />
                                <div style={{ flex: 1 }}>
                                    <div style={{ color: C.sub, fontSize: 9, fontFamily: "'JetBrains Mono',monospace", letterSpacing: 1.5, marginBottom: 3 }}>STRESS LEVEL</div>
                                    <div style={{ color: lv.c, fontFamily: "'Space Grotesk',sans-serif", fontWeight: 700, fontSize: 24, lineHeight: 1 }}>{lv.em} {result.stress_level}</div>
                                    <div style={{ color: C.sub, fontSize: 11, marginTop: 4 }}>
                                        {result.confidence}% confidence
                                        {result.frames_analyzed ? ` · ${result.frames_analyzed} frames` : ""}
                                        {result.word_count ? ` · ${result.word_count} words` : ""}
                                    </div>
                                    <div style={{ marginTop: 8, display: "flex", gap: 6, flexWrap: "wrap" }}>
                                        {result.saved && <Tag label="Saved" color={C.lime} icon="✓" />}
                                        {result.source && <Tag label={result.source.replace(/_/g, " ")} color={C.cyan} />}
                                    </div>
                                </div>
                            </div>
                            {/* Bar */}
                            <div style={{ height: 5, background: C.b0, borderRadius: 3, overflow: "hidden", marginBottom: 12 }}>
                                <div style={{ height: "100%", borderRadius: 3, width: `${(result.stress_score / 10) * 100}%`, background: `linear-gradient(90deg,${C.lime},${lv.c})`, transition: "width 1.2s ease" }} />
                            </div>
                            <p style={{ color: "#8cb8cc", fontSize: 13, lineHeight: 1.75 }}>{result.brief_summary}</p>
                        </div>

                        {/* Cues */}
                        {(result.facial_cues?.length || result.voice_cues?.length || result.posture_cues?.length) ? (
                            <div style={{ background: C.card, border: `1px solid ${C.b0}`, borderRadius: 18, padding: 20, display: "flex", flexDirection: "column", gap: 14 }}>
                                {result.facial_cues?.length > 0 && (
                                    <div>
                                        <div style={{ color: C.cyan, fontFamily: "'JetBrains Mono',monospace", fontSize: 10, letterSpacing: 1, marginBottom: 8 }}>FACIAL CUES</div>
                                        {result.facial_cues.map((c, i) => (
                                            <div key={i} style={{ display: "flex", gap: 8, marginBottom: 6 }}>
                                                <span style={{ color: C.cB, flexShrink: 0, marginTop: 2 }}>▸</span>
                                                <span style={{ color: C.sub, fontSize: 12, lineHeight: 1.5 }}>{c}</span>
                                            </div>
                                        ))}
                                    </div>
                                )}
                                {result.voice_cues?.length > 0 && (
                                    <div>
                                        <div style={{ color: C.violet, fontFamily: "'JetBrains Mono',monospace", fontSize: 10, letterSpacing: 1, marginBottom: 8 }}>VOICE CUES</div>
                                        {result.voice_cues.map((c, i) => (
                                            <div key={i} style={{ display: "flex", gap: 8, marginBottom: 6 }}>
                                                <span style={{ color: "#b06bff44", flexShrink: 0, marginTop: 2 }}>▸</span>
                                                <span style={{ color: C.sub, fontSize: 12, lineHeight: 1.5 }}>{c}</span>
                                            </div>
                                        ))}
                                    </div>
                                )}
                                {result.posture_cues?.length > 0 && (
                                    <div>
                                        <div style={{ color: C.amber, fontFamily: "'JetBrains Mono',monospace", fontSize: 10, letterSpacing: 1, marginBottom: 8 }}>POSTURE</div>
                                        {result.posture_cues.map((c, i) => (
                                            <div key={i} style={{ display: "flex", gap: 8, marginBottom: 6 }}>
                                                <span style={{ color: "#ffbe0044", flexShrink: 0, marginTop: 2 }}>▸</span>
                                                <span style={{ color: C.sub, fontSize: 12, lineHeight: 1.5 }}>{c}</span>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        ) : null}

                        {/* Combined breakdown */}
                        {result.face_score != null && result.voice_score != null && (
                            <div style={{ background: C.card, border: `1px solid ${C.b0}`, borderRadius: 18, padding: 20 }}>
                                <div style={{ color: C.txt, fontFamily: "'Space Grotesk',sans-serif", fontWeight: 600, fontSize: 13, marginBottom: 14 }}>Combined Breakdown</div>
                                {[["👁 Face", result.face_score, result.face_level, C.cyan], ["🎙 Voice", result.voice_score, result.voice_level, C.violet]].map(([lbl, sc, lv2, col]) => (
                                    <div key={lbl} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 12px", borderRadius: 10, marginBottom: 8, background: `${col}0a`, border: `1px solid ${col}22` }}>
                                        <span style={{ color: C.sub, fontSize: 12 }}>{lbl}</span>
                                        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                                            <span style={{ color: col, fontFamily: "'JetBrains Mono',monospace", fontWeight: 600, fontSize: 14 }}>{sc}/10</span>
                                            {lv2 && <Tag label={lv2} color={LVL[lv2]?.c || C.sub} />}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* RIGHT */}
                    <div style={{ display: "flex", flexDirection: "column", gap: 15 }}>
                        {/* Probabilities */}
                        {result.probabilities && (
                            <div style={{ background: C.card, border: `1px solid ${C.b0}`, borderRadius: 18, padding: 20 }}>
                                <div style={{ color: C.txt, fontFamily: "'Space Grotesk',sans-serif", fontWeight: 600, fontSize: 13, marginBottom: 14 }}>Level Probabilities</div>
                                {Object.keys(LVL).map(n => <ProbBar key={n} name={n} pct={result.probabilities[n] || 0} color={LVL[n].c} />)}
                            </div>
                        )}

                        {/* Raw metrics (face) */}
                        {result.raw_metrics && (
                            <div style={{ background: C.card, border: `1px solid ${C.b0}`, borderRadius: 18, padding: 20 }}>
                                <div style={{ color: C.txt, fontFamily: "'Space Grotesk',sans-serif", fontWeight: 600, fontSize: 13, marginBottom: 14 }}>Raw Face Metrics</div>
                                {Object.entries(result.raw_metrics).map(([k, v]) => (
                                    <div key={k} style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: `1px solid ${C.b0}` }}>
                                        <span style={{ color: C.sub, fontSize: 11 }}>{k.replace(/_/g, " ")}</span>
                                        <span style={{ color: C.cyan, fontFamily: "'JetBrains Mono',monospace", fontSize: 11 }}>{typeof v === "number" ? (v < 1 ? v.toFixed(3) : v.toFixed(1)) : String(v)}</span>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* Voice metrics */}
                        {result.word_count != null && (
                            <div style={{ background: C.card, border: `1px solid ${C.b0}`, borderRadius: 18, padding: 20 }}>
                                <div style={{ color: C.txt, fontFamily: "'Space Grotesk',sans-serif", fontWeight: 600, fontSize: 13, marginBottom: 14 }}>Voice Metrics</div>
                                {[["Words spoken", result.word_count], ["Speech rate", `${result.words_per_sec} w/s`], ["Stress keywords", result.high_stress_words_found], ["Positive words", result.positive_words_found], ["Filler words", result.filler_count]].map(([k, v]) => (
                                    <div key={k} style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: `1px solid ${C.b0}` }}>
                                        <span style={{ color: C.sub, fontSize: 11 }}>{k}</span>
                                        <span style={{ color: C.violet, fontFamily: "'JetBrains Mono',monospace", fontSize: 11 }}>{v}</span>
                                    </div>
                                ))}
                                {result.transcript && (
                                    <div style={{ marginTop: 10, padding: "8px 10px", background: C.bg2, borderRadius: 8, border: `1px solid ${C.b0}`, color: C.sub, fontSize: 11, lineHeight: 1.6, fontStyle: "italic" }}>
                                        "{result.transcript.slice(0, 180)}{result.transcript.length > 180 ? "…" : ""}"
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Recommendations */}
                        <div style={{ background: C.card, border: `1px solid ${C.b0}`, borderRadius: 18, padding: 20, flex: 1 }}>
                            <div style={{ color: C.txt, fontFamily: "'Space Grotesk',sans-serif", fontWeight: 600, fontSize: 13, marginBottom: 14 }}>Recommendations</div>
                            {recs.map((r, i) => (
                                <div key={i} className="si" style={{ display: "flex", gap: 10, marginBottom: 10, padding: "10px 12px", borderRadius: 10, animationDelay: `${i * .1}s`, background: `${lv.c}09`, border: `1px solid ${lv.c}20` }}>
                                    <div style={{ width: 20, height: 20, borderRadius: "50%", flexShrink: 0, background: `${lv.c}1a`, display: "flex", alignItems: "center", justifyContent: "center", color: lv.c, fontSize: 9, fontWeight: 700, fontFamily: "'Space Grotesk',sans-serif" }}>{i + 1}</div>
                                    <span style={{ color: "#8cb8cc", fontSize: 12, lineHeight: 1.65 }}>{r}</span>
                                </div>
                            ))}
                        </div>

                        <button className="hov" onClick={onReset} style={{ padding: "13px", borderRadius: 12, border: "none", cursor: "pointer", background: "linear-gradient(135deg,#00e5ff,#b06bff)", color: "#050912", fontFamily: "'Space Grotesk',sans-serif", fontWeight: 700, fontSize: 14, boxShadow: "0 6px 28px #00e5ff22" }}>
                            Scan Again
                        </button>
                    </div>
                </div>
            );
        }

        /* ===== SIDEBAR ===== */
        function Sidebar({ tab, setTab, last, ok, checking }) {
            const lv = last ? LVL[last.stress_level] : null;
            const nav = [
                { id: "dash", icon: "🏠", label: "Dashboard" },
                { id: "face", icon: "👁", label: "Face Scan", badge: "OPENCV" },
                { id: "voice", icon: "🎙", label: "Voice Scan", badge: "NLP" },
                { id: "combined", icon: "⚡", label: "Combined", badge: "BEST" },
                { id: "chat", icon: "💬", label: "AI Chat" },
                { id: "tracker", icon: "📈", label: "Tracker" },
                { id: "wellness", icon: "🌿", label: "Wellness" },
            ];
            return (
                <aside style={{ width: 214, minHeight: "100vh", background: C.card, borderRight: `1px solid ${C.b0}`, display: "flex", flexDirection: "column", position: "fixed", left: 0, top: 0, zIndex: 300, boxShadow: "4px 0 20px #00000033" }}>
                    {/* Logo */}
                    <div style={{ padding: "18px 14px 14px", borderBottom: `1px solid ${C.b0}` }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
                            <div style={{ width: 40, height: 40, borderRadius: 12, flexShrink: 0, animation: "glow 3s infinite", background: "linear-gradient(135deg,#00e5ff,#b06bff)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20 }}>🧘</div>
                            <div>
                                <div style={{ fontFamily: "'Space Grotesk',sans-serif", fontWeight: 700, fontSize: 18, color: C.txt, letterSpacing: -.3 }}>MindMate</div>
                                <div style={{ fontSize: 8, color: C.cyan, letterSpacing: 3, fontFamily: "'JetBrains Mono',monospace" }}>v4 ENHANCED</div>
                            </div>
                        </div>
                        <div style={{ display: "flex", alignItems: "center", gap: 7, padding: "6px 10px", background: C.bg2, borderRadius: 8, border: `1px solid ${ok ? "#a8ff3e33" : C.b0}`, transition: "border-color .4s" }}>
                            {checking && !ok
                                ? <div style={{ width: 7, height: 7, borderRadius: "50%", background: C.cyan, animation: "blink .7s infinite", flexShrink: 0 }} />
                                : <Dot on={ok} color={ok ? C.lime : C.rose} size={7} />}
                            <span style={{ fontSize: 10, fontFamily: "'JetBrains Mono',monospace", color: ok ? C.lime : checking ? C.cyan : C.rose, transition: "color .4s" }}>
                                {ok ? "backend online" : checking ? "connecting…" : "backend offline"}
                            </span>

        /* ===== VOICE SCAN PAGE ===== */
        function VoiceScanPage({ onResult, ok }) {
            const [phase, setPhase] = useState("idle");
            const [transcript, setTranscript] = useState("");
            const [result, setResult] = useState(null);
            const [dur, setDur] = useState(0);
            const [active, setActive] = useState(false);
            const [err, setErr] = useState("");
            const recognRef = useRef(null), timerRef = useRef(null), startRef = useRef(0), listeningRef = useRef(false);

            useEffect(() => () => { recognRef.current?.stop(); clearInterval(timerRef.current); }, []);

            function startListen() {
                setErr("");
                const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SR) { setErr("Speech Recognition not supported. Please use Chrome or Edge browser."); return; }
                const r = new SR();
                r.continuous = true; r.interimResults = true; r.lang = "en-US";
                let full = "";
                r.onresult = e => { let interim = ""; for (let i = e.resultIndex; i < e.results.length; i++) { if (e.results[i].isFinal) full += e.results[i][0].transcript + " "; else interim += e.results[i][0].transcript; } setTranscript((full + interim).trim()); };
                r.onerror = e => {
                    if (e.error === 'aborted') return;
                    if (e.error === 'no-speech') {
                        // ignore no-speech and let onend handle restarting if still listening
                        return;
                    }
                    listeningRef.current = false;
                    setErr("Mic error: " + e.error); setPhase("idle"); setActive(false);
                };
                r.onend = () => {
                    // if still in listening phase, restart the recognition (it stopped due to silence)
                    if (listeningRef.current) {
                        setTimeout(() => {
                            if (listeningRef.current) {
                                try { recognRef.current?.start(); } catch (e) { console.error("Speech restart error:", e); }
                            }
                        }, 50);
                    } else {
                        setActive(false);
                    }
                };
                r.start(); recognRef.current = r;
                startRef.current = Date.now();
                listeningRef.current = true;
                setPhase("listening"); setActive(true); setTranscript(""); setDur(0);
                timerRef.current = setInterval(() => setDur(Math.round((Date.now() - startRef.current) / 1000)), 500);
            }

            async function stopAnalyze() {
                listeningRef.current = false;
                recognRef.current?.stop(); clearInterval(timerRef.current);
                const d = (Date.now() - startRef.current) / 1000;
                setPhase("proc"); setActive(false);
                let res = null;
                if (ok && transcript.trim().length > 2) res = await apiPost("/voice/analyze", { transcript, duration: d });
                if (!res) {
                    await new Promise(r => setTimeout(r, 1200));
                    const words = transcript.trim().split(/\s+/).filter(Boolean);
                    const s = parseFloat(Math.min(9, 2.5 + words.length * .1 + ((transcript.includes("stress") || transcript.includes("anxious") || transcript.includes("overwhelm")) ? 2 : 0)).toFixed(1));
                    const lv = lvlFromScore(s);
                    res = { stress_score: s, stress_level: lv, confidence: 58, voice_analyzed: true, word_count: words.length, words_per_sec: parseFloat((words.length / Math.max(d, 1)).toFixed(2)), high_stress_words_found: 0, positive_words_found: 0, filler_count: 0, transcript: transcript.slice(0, 300), cues: ["Client-side fallback — start backend for full NLP"], brief_summary: `${words.length} words analyzed. ${lv} stress level detected.`, recommendations: RECS[lv], source: "voice_sim" };
                }
                setResult(res); onResult(res); setPhase("done");
            }

            function reset() { listeningRef.current = false; setResult(null); setPhase("idle"); setTranscript(""); setDur(0); setErr(""); }

            if (phase === "idle") return (
                <div className="fu" style={{ background: C.card, border: `1px solid ${C.b1}`, borderRadius: 22, padding: "50px 40px", textAlign: "center", display: "flex", flexDirection: "column", alignItems: "center", gap: 24 }}>
                    <div style={{ position: "relative", width: 100, height: 100 }}>
                        <div style={{ width: 100, height: 100, borderRadius: "50%", background: C.vA, border: `2px solid #b06bff44`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 44, animation: "glow 3s infinite" }}>🎙</div>
                        <div style={{ position: "absolute", top: -4, right: -4, width: 28, height: 28, borderRadius: "50%", background: C.violet, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14 }}>📝</div>
                    </div>
                    <div>
                        <h2 style={{ fontFamily: "'Space Grotesk',sans-serif", fontWeight: 700, fontSize: 26, color: C.txt, marginBottom: 10 }}>Voice Stress Detection</h2>

                    if (SR) {

                    let msg = "Could not initialize scan.";

                    else if (e.name === "NotFoundError") msg = "Hardware not found. Check camera/mic connection.";

        /* ===== CHAT PAGE ===== */

        /* ===== TRACKER PAGE ===== */
        function TrackerPage({ local }) {
            const [hist, setHist] = useState(local);

            useEffect(() => { setLoading(true); apiGet("/scan/history?limit=40").then(d => { if (d?.history?.length) setHist(d.history); else setHist(local); setLoading(false); }); }, []);

            const filtered = filter === "all" ? hist : hist.filter(h => h.source?.includes(filter));
            const avg = filtered.length ? (filtered.reduce((a, b) => a + b.stress_score, 0) / filtered.length).toFixed(1) : "—";

            const W = 580, H = 148, P = { t: 14, b: 24, l: 28, r: 10 };
            const pts = [...filtered].reverse().slice(0, 14);
            const iw = W - P.l - P.r, ih = H - P.t - P.b;
            const xs = pts.map((_, i) => P.l + (i / Math.max(pts.length - 1, 1)) * iw);

            const linePath = xs.map((x, i) => `${i === 0 ? "M" : "L"} ${x} ${ys[i]}`).join(" ");
            const fillPath = pts.length > 1 ? `${linePath} L ${xs[xs.length - 1]} ${P.t + ih} L ${xs[0]} ${P.t + ih} Z` : "";
            const srcC = { face_scan: C.cyan, voice: C.violet, combined: C.lime, face_sim: C.sub, voice_sim: C.sub, combined_sim: C.sub };

                            {[0, 5, 10].map(v => <text key={v} x={P.l - 5} y={P.t + ih - (v / 10) * ih + 3} textAnchor="end" fill={C.dim} fontSize={8} fontFamily="'JetBrains Mono',monospace">{v}</text>)}

                                <div key={d.id || i} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 12px", background: C.bg2, borderRadius: 9, border: `1px solid ${C.b0}`, marginBottom: 6 }}>

        /* ===== WELLNESS PAGE ===== */
        function WellnessPage() {
            const [bPhase, setBPhase] = useState("idle");
            const [bSec, setBSec] = useState(0);
            const [bRound, setBRound] = useState(0);
            const breathRef = useRef(null);
            const [tip, setTip] = useState(0);

            const TIPS = [
                { icon: "💤", title: "Sleep Hygiene", body: "Aim for 7-9 hours. Maintain a consistent wake time, even on weekends. Avoid screens 1 hour before bed." },
                { icon: "🚶", title: "Movement Breaks", body: "Every 45 minutes of studying, take a 5-minute walk. Physical movement directly reduces cortisol levels." },
                { icon: "🥗", title: "Nutrition", body: "Avoid skipping meals. Complex carbs stabilize blood sugar and mood. Limit caffeine after 2pm." },
                { icon: "📱", title: "Digital Detox", body: "Set app time limits. Notifications trigger cortisol spikes. Try 1 hour phone-free before sleep." },
                { icon: "🤝", title: "Social Support", body: "Isolation amplifies stress. Even 10 minutes with a friend or calling family significantly reduces anxiety." },
                { icon: "📓", title: "Journaling", body: "5 minutes of writing about what stressed you today helps your brain process and compartmentalize it." },
            ];

            function startBreath() {
                setBPhase("in"); setBSec(4); setBRound(1); clearInterval(breathRef.current);
                let phase = "in", s = 4, round = 1;
                breathRef.current = setInterval(() => {
                    s--;
                    if (s <= 0) { if (phase === "in") { phase = "hold"; s = 7; } else if (phase === "hold") { phase = "out"; s = 8; } else { phase = "in"; s = 4; round++; if (round > 4) { stopBreath(); return; } } }
                    setBPhase(phase); setBSec(s); setBRound(round);
                }, 1000);
            }
            function stopBreath() { clearInterval(breathRef.current); setBPhase("idle"); setBSec(0); setBRound(0); }
            useEffect(() => () => clearInterval(breathRef.current), []);

            const bColor = bPhase === "in" ? C.cyan : bPhase === "hold" ? C.amber : bPhase === "out" ? C.lime : C.sub;
            const bLabel = bPhase === "in" ? "Breathe IN" : bPhase === "hold" ? "Hold" : bPhase === "out" ? "Breathe OUT" : "4-7-8 Breathing";

            return (
                <div className="fu" style={{ display: "flex", flexDirection: "column", gap: 20 }}>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 18 }}>

                        <div style={{ background: C.card, border: `1px solid ${C.b0}`, borderRadius: 20, padding: 26, textAlign: "center" }}>

                                    <div style={{ color: bColor, fontFamily: "'Space Grotesk',sans-serif", fontWeight: 700, fontSize: 13, marginBottom: 3, textAlign: "center", padding: "0 8px" }}>{bLabel}</div>

                            <button className="hov" onClick={bPhase === "idle" ? startBreath : stopBreath} style={{ padding: "11px 30px", borderRadius: 11, border: "none", cursor: "pointer", background: bPhase === "idle" ? "linear-gradient(135deg,#00e5ff,#b06bff)" : "linear-gradient(135deg,#ff3e6c,#ff7a40)", color: "#050912", fontFamily: "'Space Grotesk',sans-serif", fontWeight: 700, fontSize: 13 }}>

                            </button>
                            <p style={{ color: C.sub, fontSize: 11, marginTop: 12, lineHeight: 1.6 }}>4 rounds · ~75 seconds · Activates parasympathetic system</p>
                        </div>

                        {/* Tips */}
                        <div style={{ background: C.card, border: `1px solid ${C.b0}`, borderRadius: 20, padding: 26 }}>
                            <div style={{ fontFamily: "'Space Grotesk',sans-serif", fontWeight: 700, color: C.txt, fontSize: 15, marginBottom: 16 }}>Stress Management Tips</div>
                            <div style={{ display: "flex", gap: 7, flexWrap: "wrap", marginBottom: 16 }}>
                                {TIPS.map((t, i) => (
                                    <button key={i} onClick={() => setTip(i)} style={{ padding: "5px 11px", borderRadius: 20, cursor: "pointer", border: `1px solid ${tip === i ? C.cyan : C.b0}`, background: tip === i ? C.cA : "transparent", color: tip === i ? C.cyan : C.sub, fontSize: 11, fontFamily: "'JetBrains Mono',monospace" }}>{t.icon}</button>

                            </div>
                            <div style={{ background: C.bg2, border: `1px solid ${C.b1}`, borderRadius: 14, padding: 20 }}>
                                <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
                                    <span style={{ fontSize: 28 }}>{TIPS[tip].icon}</span>
                                    <div style={{ color: C.txt, fontFamily: "'Space Grotesk',sans-serif", fontWeight: 700, fontSize: 16 }}>{TIPS[tip].title}</div>
                                </div>
                                <p style={{ color: "#8cb8cc", fontSize: 13, lineHeight: 1.8 }}>{TIPS[tip].body}</p>

                    </div>

                    {/* Mood check-in */}
                    <div style={{ background: C.card, border: `1px solid ${C.b0}`, borderRadius: 20, padding: 24 }}>

                        <div style={{ display: "flex", gap: 14, flexWrap: "wrap" }}>

                                <div key={lbl} className="card-h" style={{ background: C.bg2, border: `1px solid ${C.b0}`, borderRadius: 14, padding: "14px 16px", cursor: "pointer", textAlign: "center", flex: "1 1 130px" }}>

                                <div key={n} style={{ background: C.bg, border: `1px solid ${col}20`, borderRadius: 12, padding: "14px 15px" }}>
                                    <div style={{ color: col, fontFamily: "'Space Grotesk',sans-serif", fontWeight: 700, fontSize: 12, marginBottom: 4 }}>{n}</div>

                    </div>

                    {/* Stats */}
                    <div style={{ display: "grid", gridTemplateColumns: "repeat(5,1fr)", gap: 12 }}>
                        {[["Weekly Avg", avg, "/10", C.cyan], ["Face Scans", hist.filter(h => h.source?.includes("face")).length, "", C.lime], ["Voice Scans", hist.filter(h => h.source?.includes("voice")).length, "", C.violet], ["Backend", ok ? "Online" : "Offline", "", ok ? C.lime : C.rose], ["Dataset", stats ? stats.total_students + "" : "600", " rows", C.amber]].map(([lbl, v, u, c], i) => (
                            <div key={i} className="card-h" style={{ background: C.card, border: `1px solid ${C.b0}`, borderRadius: 16, padding: "15px 12px", textAlign: "center" }}>
                                <div style={{ fontSize: 10, color: C.sub, fontFamily: "'JetBrains Mono',monospace", letterSpacing: 1, marginBottom: 6 }}>{lbl}</div>
                                <div style={{ color: c, fontFamily: "'Space Grotesk',sans-serif", fontWeight: 700, fontSize: 20 }}>{v}<span style={{ fontSize: 10, opacity: .7 }}>{u}</span></div>

                                    <div style={{ flex: 1 }}>
                                        <div style={{ color: C.txt, fontFamily: "'Space Grotesk',sans-serif", fontWeight: 600, fontSize: 13 }}>{title} <span style={{ fontSize: 9, fontFamily: "'JetBrains Mono',monospace", color }}>{tech}</span></div>
                                        <div style={{ color: C.sub, fontSize: 11 }}>{desc}</div>

                        <div style={{ background: C.card, border: `1px solid ${C.b0}`, borderRadius: 20, padding: 22 }}>

        /* ===== ROOT APP ===== */
        function App() {
            const [tab, setTab] = useState("dash");
            const [hist, setHist] = useState(seedHist);
            const [last, setLast] = useState(null);
            const [ok, setOk] = useState(false);
            const [checking, setCk] = useState(false);
            const [stats, setStats] = useState(null);
            const wasOk = useRef(false);
            const checkFn = useRef(null);

            async function loadData() {
                const s = await apiGet("/stats");
                if (s) setStats(s);
                const h = await apiGet("/scan/history?limit=30");
                if (h?.history?.length) {
                    setHist(prev => {
                        const all = [...h.history, ...prev.slice(0, 7)];
                        const seen = new Set();
                        return all.filter(e => { const k = `${e.date}_${e.stress_score}_${e.source}`; if (seen.has(k)) return false; seen.add(k); return true; });
                    });
                }
            }

            async function checkBackend() {
                setCk(true);
                const d = await apiGet("/health");
                const live = !!d?.status;
                setCk(false);
                if (live && !wasOk.current) { wasOk.current = true; setOk(true); loadData(); }
                else if (!live && wasOk.current) { wasOk.current = false; setOk(false); setStats(null); }
                else setOk(live);
            }
            checkFn.current = checkBackend;

            useEffect(() => {
                checkBackend();
                const id = setInterval(() => checkFn.current?.(), 3000);
                return () => clearInterval(id);
            }, []);

            function onResult(r) {
                setLast(r);
                setHist(p => [{ ...r, date: r.date || fmtDate(), time: r.time || fmtTime() }, ...p.slice(0, 39)]);
            }

            return (
                <div style={{ display: "flex", minHeight: "100vh", background: C.bg }}>
                    <Sidebar tab={tab} setTab={setTab} last={last} ok={ok} checking={checking} />
                    <div style={{ marginLeft: 214, flex: 1, display: "flex", flexDirection: "column", minHeight: "100vh" }}>
                        <Topbar tab={tab} ok={ok} checking={checking} />
                        <main style={{ flex: 1, padding: 22, overflowY: "auto" }}>
                            {tab === "dash" && <DashboardPage hist={hist} last={last} setTab={setTab} ok={ok} checking={checking} stats={stats} onRetry={checkBackend} />}
                            {tab === "face" && <FaceScanPage onResult={onResult} ok={ok} />}
                            {tab === "voice" && <VoiceScanPage onResult={onResult} ok={ok} />}
                            {tab === "combined" && <CombinedScanPage onResult={onResult} ok={ok} />}
                            {tab === "chat" && <ChatPage ctx={last} />}
                            {tab === "tracker" && <TrackerPage local={hist} />}
                            {tab === "wellness" && <WellnessPage />}
                        </main>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>

</html>
